---
layout: default
title: Blog
permalink: /blog
description: "Yeah!"
---
<h1>Latest Posts</h1>


  <ul>
    {% for post in site.posts %}
    <div class="post-box">
      <div class="post-text">
        <li>
          <div class="post-img">
            <div><h2><a id="post-link" href="{{ post.url }}">{{ post.title }}</a> - {{ post.date | date_to_long_string}}</h2></div>
            <div><a id="post-link" href="/about"></a><img id="author"src="assets/media/aj.jpeg" alt="abdul" width="50" height="50"> </img></a></div>
          </div>  
          {{ post.excerpt }}
        </li>
      </div>
      
    </div>
    {% endfor %}
  </ul>

  <style> 
    img {padding: 5px;}
    img:hover {transform: scale(2); /* Double the size */}
  </style>
